display:
  renderer:
    type: enum
    values: ["NULL", OPENGL, VULKAN]
    default: OPENGL
  vulkan:
    validation_layers: bool
    debug_shaders: bool
    assert_on_validation_msg: bool
    preferred_physical_device: string
  quality:
    surface_scale:
      type: integer
      default: 1
  filtering:
    type: enum
    values: [linear, nearest]
    default: linear
  window:
    fullscreen_on_startup: bool
    fullscreen_exclusive: bool
    startup_size:
      type: enum
      values: [last_used, 640x480, 720x480, 1280x720, 1280x800, 1280x960, 1920x1080, 2560x1440, 2560x1600, 2560x1920, 3840x2160]
      default: 1280x960
    last_width:
      type: integer
      default: 640
    last_height:
      type: integer
      default: 480
    vsync:
      type: bool
      default: true
  ui:
    show_menubar:
      type: bool
      default: true
    show_notifications:
      type: bool
      default: true
    hide_cursor:
      type: bool
      default: true
    use_animations:
      type: bool
      default: true
    fit:
      type: enum
      values: [center, scale, stretch]
      default: scale
    aspect_ratio:
      type: enum
      values: [native, auto, 4x3, 16x9]
      default: auto
    scale:
      type: float
      default: 1
    auto_scale:
      type: bool
      default: true
  debug:
    video:
      transparency:
        type: bool
        default: false
      x_pos:
        type: number
        default: 100.0
      y_pos:
        type: number
        default: 100.0
      x_winsize:
        type: number
        default: 600.0
      y_winsize:
        type: number
        default: 150.0
      advanced_tree_state:
        type: bool
        default: false
  setup_nvidia_profile:
    type: bool
    default: true

audio:
  vp:
    num_workers:
      type: integer
      default: 0  # 0 = auto
  use_dsp: bool
  use_dsp_jit:
    type: bool
    default: true
  hrtf:
    type: bool
    default: true
  volume_limit:
    type: number
    default: 1

net:
  enable: bool
  backend:
    type: enum
    values: [nat, udp, pcap]
    default: nat
  pcap:
    netif: string
  udp:
    bind_addr:
      type: string
      default: 0.0.0.0:9368
    remote_addr:
      type: string
      default: 1.2.3.4:9368
  nat:
    forward_ports:
      type: array
      items:
        host: integer
        guest: integer
        protocol:
          type: enum
          values: [tcp, udp]
          default: tcp

sys:
  mem_limit:
    type: enum
    values: ['64', '128']
    default: '64'
  avpack:
    type: enum
    values: [scart, hdtv, vga, rfu, svideo, composite, none]
    default: hdtv
  files:
    bootrom_path: string
    flashrom_path: string
    eeprom_path: string
    hdd_path: string
    dvd_path: string

perf:
  hard_fpu:
    type: bool
    default: true
  cache_shaders:
    type: bool
    default: true
